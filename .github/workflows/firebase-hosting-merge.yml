name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-hosting-live-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy live site
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DORODORO_1234 }}
          channelId: live
          projectId: dorodoro-1234
